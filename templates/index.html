<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>🚀 Task Manager</h1>
        
        <!-- Add Task Form -->
        <div class="card mb-4">
            <div class="card-body">
                <form method="POST" action="/add">
                    <div class="row">
                        <div class="col-md-4">
                            <input type="text" name="title" class="form-control" placeholder="Task Title" required>
                        </div>
                        <div class="col-md-4">
                            <input type="date" name="due_date" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <textarea name="description" class="form-control" placeholder="Description (optional)"></textarea>
                        </div>
                        <div class="col-md-1">
                            <button type="submit" class="btn btn-primary w-100">Add</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tasks List -->
        <div class="row">
            {% for task in tasks %}
            <div class="col-md-6 mb-3">
                <div class="card {% if task.status == 'done' %}border-success{% else %}border-warning{% endif %}">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h5 class="card-title">{{ task.title }}</h5>
                                <p class="card-text">{{ task.description[:50] }}...</p>
                                {% if task.due_date %}
                                <small class="text-muted">Due: {{ task.due_date }}</small>
                                {% endif %}
                            </div>
                            <div>
                                <a href="/complete/{{ task.id }}" class="btn btn-sm btn-outline-success">✓</a>
                                <a href="/delete/{{ task.id }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete?')">×</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
